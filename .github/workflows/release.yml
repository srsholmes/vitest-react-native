name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or detect publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm (trusted publishing)
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          # Debug info
          echo "npm version: $(npm --version)"
          echo "Node version: $(node --version)"

          # Remove _authToken from .npmrc so npm uses OIDC instead
          NPMRC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          echo "Cleaning auth token from $NPMRC"
          sed -i '/_authToken/d' "$NPMRC"
          cat "$NPMRC"

          cd packages/vitest-react-native
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @srsholmes/vitest-react-native version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "Publishing @srsholmes/vitest-react-native@$CURRENT"
            npm publish --provenance --access public
          else
            echo "Version $CURRENT already published, skipping"
          fi
